<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Bandera roja | Kevin Castillo</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0b0d10;
      color: #eef0f3;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
    }
    .flag {
      position: fixed;
      inset: 0 auto 0 0;
      width: 18px;
      background:
        repeating-linear-gradient(0deg, #e8342a 0 40px, #b3271f 40px 80px);
      animation: slide 2.4s linear infinite;
    }
    .flag.right { inset: 0 0 0 auto; }
    @keyframes slide { to { background-position: 0 80px; } }
    @media (prefers-reduced-motion: reduce) { .flag { animation: none; } }
    .wrap { text-align: center; padding: 24px; max-width: 560px; }
    .code {
      font-size: clamp(84px, 20vw, 180px);
      font-weight: 900;
      font-style: italic;
      letter-spacing: -0.04em;
      line-height: 1;
      color: #e8342a;
    }
    .label {
      font-size: 13px;
      letter-spacing: 0.35em;
      color: #9aa3af;
      text-transform: uppercase;
      margin-top: 8px;
    }
    h1 { font-size: clamp(20px, 4vw, 28px); margin-top: 18px; font-weight: 700; }
    p { color: #9aa3af; margin-top: 10px; line-height: 1.6; }
    a.btn {
      display: inline-block;
      margin-top: 28px;
      padding: 14px 34px;
      background: #e8342a;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-size: 13px;
      transform: skewX(-8deg);
    }
    a.btn span { display: inline-block; transform: skewX(8deg); }
    a.btn:hover { background: #ff4a3f; }
  </style>
</head>
<body>
  <div class="flag"></div>
  <div class="flag right"></div>
  <div class="wrap">
    <div class="code">404</div>
    <div class="label">Bandera roja &mdash; sesión detenida</div>
    <h1>Esta curva no existe en el circuito.</h1>
    <p>Te saliste del trazado. Vuelve a la línea de salida y retoma la carrera.</p>
    <a class="btn" href="/"><span>Volver a pista</span></a>
  </div>
</body>
</html>
